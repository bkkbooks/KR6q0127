body:
  text: 宋寂音尊者慧洪覺範撰門人覺慈編涅槃經曰譬如有人以雜毒藥用塗大鼓於衆人中擊之發聲雖無心欲聞聞之皆死唯除一人不橫死者是大乘典大涅槃經亦復如是在在處處諸行衆中有聞聲者所有貪欲瞋恚愚癡悉皆滅盡其中雖有無心思念是大涅槃因緣力故能滅煩惱諸結自滅犯四重禁及五無間聞是經已亦作無上菩提因緣漸斷煩惱除不橫死一闡提也又曰何等名為祕密之藏猶如伊字三點若並則不成伊從亦不成如摩醯首羅面上三目乃得成伊三點若別亦不得成我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為衆生故名入涅槃如世伊字傳曰巖頭奯禪師嘗曰涅槃經此三段義略似宗門夫言似則非宗門旨要明矣然宗門旨要雖即文字語言不可見離文字語言亦安能見哉臨濟曰大凡舉唱須一句中具三玄一玄中具三要有玄有要此塗毒鼓聲也臨濟歿二百年尚有聞而死者夫分賓主如並存照用如別立君臣如從慈明曰一句分賓主照用一時行若會箇中意日午打三更同安曰賓主穆時全是妄君臣合處正中邪還鄉曲調如何唱明月堂前枯樹花如前語句皆非一代時教之所管攝摩醯首羅面上豎亞一目非常目也破色心論曰於有色處眼則見色餘無色處不見色者此義不然何以故以彼夢中於無色處則見有色於有色處不見色故傳曰於有色處者寤時也而夢時不見夢中無色處也而反見色顛倒也齊劉瑱之妹鄱陽王妃也王為明帝誅妃追傷成疾醫所不能治瑱善畫人陳郡殷蒨善寫人面瑱畫王寵姬而使蒨畫王共臨鏡以示妃妃見之唾罵曰是固宜蚤死於是恩情即歇而疾除蓋因愛心歇則顛倒想滅也圭峯密禪師偈曰作有義事是惺悟心作無義事是散亂心散亂隨情轉臨終被業牽惺悟不由情臨終能轉業傳曰朝奉大夫孫于之嫂年十九而寡自誓一飯終身誦法華經不復嫁于守高安嫂年已七十餘面目光澤舉止輕利政和六年夏六月忽收經帙料理服玩與侍妾于問其故笑曰我更三日死矣果如期而逝韓子蒼問豫曰人之將終有前知者何術致之豫曰譬如牛乳以酵發之雖緣緣之中無有作者久而成酪非自外來生乳中故非自能生以酵發之故緣緣成熟忽然成就乃有偈其略曰酪出乳中無別法死而何苦欲先知如某夫人華年休息白首見效凡五十餘年心心無間自然前知化日酪出乳中也然觀圭峯偈語恐於死時未得自在以其皆理障故如本朝太祖皇帝將問罪江南江南後主遣其臣徐鉉入對誦習以備顧問且欲以舌辨存國既見曰江南國主如子事父以事陛下奈何欲伐之太祖曰父子異居可乎鉉愕然無以對今平生知誦圭峯之偈語至於臨終為徐鉉愕然者皆是也風穴沼禪師升座曰世尊以青蓮目顧迦葉正當是時且道說箇什麼若言不說又成埋沒先聖語未卒念法華便下去侍者進曰念法華無所言而去何也風穴曰渠會也明日念與真上座俱詣方丈風穴問真曰如何是世尊不說說真曰鵓姑樹頭鳴風穴曰汝作許多癡福何用乃顧念曰如何對曰動容揚古路不墮悄然機風穴謂真曰何不看渠下語傳曰汾陽無德禪師作一字歌其略曰諸佛不曾說法汾陽略宣一字亦非紙墨文章不學維摩默地又曰飲光尊者同明證瞬目欽恭行正令真漏泄家風也昔黃檗嘗遣臨濟馳書至溈山既去溈山問仰山曰寂子此道人他日如何對曰黃檗法道賴此人他日大行吳越之間然遇大風則止溈山曰莫有續之者否對曰有但年代深遠不復舉似溈曰子何惜為我一舉似耶於是仰山默然曰將此身心奉塵剎是則名為報佛恩風穴暮年常憂仰山之讖己躬當之乃有念公知為仰山再來也永嘉尊者曰日夜精勤恐緣差故傳曰北齊沙門慧曉以厭鄉閭遁居靈巖數十年有任山令者自鄉閭來曉自念離鄉久思問親舊存沒詣邑謁令令適有客未得通謁久之曉忽悟曰非令慢客乃我之愛憎耳何遽懷土哉取謁書曰咄哉失念欻爾還覺遂去三祖大師曰毫𨤲有差天地懸隔傳曰南嶽思大禪師既獲宿智通尋復障起四肢緩弱不能行步自念曰病從業生業從心起心源無起外境何狀病業與身都如雲影如是觀已顛倒想滅輕安如故攝論曰處夢謂輕年悟乃須臾頃故時雖無量攝在一剎那傳曰賢首曰此中一剎那者即謂無念楞伽曰一切法不生我說剎那義初生即有滅不為愚者說以一剎那流轉必無自性故即是無生若非無生則不流轉是故契無生者方見剎那也黃檗慧禪師初謁疏山問曰剎那便去時如何曰逼塞虗空汝作麼生去慧曰逼塞虗空不如不去疏山乃默然慧出見第一座問慧曰汝適祇對之語甚奇曰亦似偶然願為開示第一座曰一剎那間還容擬議否慧於是悟旨於言下豫作偈曰逼塞虗空不行而至而剎那中寧容擬議直下便見不落意地眼孔定動則已不是還源觀曰由於塵相念念遷變即是生死由觀塵相生滅相盡空無有實即是涅槃傳曰於色聲等法念念分別名為遷變觀此色聲等法起滅無從當處解脫先觀己眼曰是眼即不能自見其己體自體尚不見云何見餘物次觀前境曰若見是樹復云何樹若見非樹云何見樹次觀三際曰若見在是有耶則過去未來亦應是有若過去未來是無耶則見在亦應是無金剛般若經曰若人於此經生淨信者非於一佛二佛三四五佛種諸善根已於無量百千萬億佛所種諸善根傳曰華嚴經曰堅翅鳥以龍為食先觀大海諸龍命將盡者即以兩翅擘海取而食之乃知信受此法非根熟衆生莫能然也神鼎諲禪師嘗曰鳥窠侍者見以布毛吹之便薦此事自非久積淨業曠劫行持安能如此汾陽昭禪師亦作偈曰侍者初心慕勝緣辭師擬去學參禪鳥窠知是根機熟吹毛當下得心安兩耆年皆首山高弟必以積淨業根機熟為言蓋其淵源出於金剛般若而不可誣也近世之邪禪乃曰此安有悟吹毛而傳悟者權耳是所謂自無目而欲廢天下視也破色心論曰如人夢中本無女子而見女人與身交會漏失不淨衆生如是無始世來虗妄受用色香味觸等外諸境皆亦如是實無而成傳曰所言實無而成者如佛在時有弟兄三人聞毗耶離國淫女菴羅婆利舍衛國淫女須曼那王舍城淫女優鉢羅槃那皆有美色晝夜念之不舍便夢與之從事覺已念曰彼女不來我亦不往而淫事得辦因是而悟一切諸法皆如是耶於是頓證惟心魏將張遼唐將王彥章皆有威名當時小兒啼不止其母呼兩人者名而兒啼止小兒未識張王而聞其名輒啼止非唯心何哉華嚴經曰毗目仙人執善財手即時善財自見其身往十佛剎微塵數世界中到十佛剎微塵數諸佛所見彼佛剎及其衆會諸佛相好種種莊嚴乃至或經百千億不可說不可說佛剎微塵數劫乃至時彼仙人放善財手善財童子即自見身還在本處傳曰方執其手即入觀門見自他不隔於毫端始終不移於當念及其放手即是出定永明曰是知不動本位之地而身遍十方未離一念之中而還經塵劫本位不動遠近之剎歷然一念靡移延促之時宛爾世尊蓋以蓮為譬而世莫有知者豫特知之夫蓮方開華時中已有子子中已有蔤因中有果果中有因三世一時也其子分布又會屬焉連續不斷十方不隔也維摩經曰文殊師利又問生死有畏菩薩當何所依維摩詰言菩薩於生死畏中當依如來功德之力文殊師利又問菩薩欲依如來功德之力當於何住答曰菩薩欲依如來功德之力當住度脫一切衆生傳曰菩薩運心非止利他乃所以自利故前聖以宏法度生為急栽培如來功德之力也休舍優婆夷自說得菩薩安隱幢以衆生未離生死菩薩不自取安隱故菩薩雖達生死性空於生死有畏未為究竟安隱無憂若能入生死教化衆生達生死及衆生而能教化者總涅槃行無出無沒方名離憂安隱幢二祖大師問達磨曰我心未寧乞師與安達磨曰將心來與汝安對曰覓心了不可得達磨曰與汝安心竟傳曰豫聞東坡之語曰如人病眼以求醫與之光明醫師曰我但有除翳藥且無與明藥明如可與還應是翳東坡可謂性與道會者也永嘉曰大丈夫秉慧劍般若鋒兮金剛𦦨非但空摧外道心早曾落卻天魔膽傳曰豫初讀斯文意其人神觀英特威掩萬僧凜然不可犯干及見其遺像頽然坐匡牀伽梨取次如少年宣律師乃知心智猛利故吐詞等刀鋸決不可以狀貌求也法華經曰如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮頗羅墮此云利根亦名捷疾亦名滿語於一切法門以利根捷疾滿語明之者乃可出離生死梁劉歊事佛精勤忽有老人無因而至曰君心力堅猛必破生死歊於化時果有靈驗今學者名為走道而已其實懶墯迷醉於色聲等法如蠅為唾所粘味永嘉之平生如香象擺壞鎖韁自在而去蓋真是比丘也維摩經曰直心是道場無虗假故傳曰所謂擇法眼者前聖授手首楞嚴曰諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成佳饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者即直心也攀緣心即虗假也永明曰心者信也謂有前識法隨相行則煩惱名識不名心也意者憶也憶想前境起於妄並是妄識不干心事心非有無有無不染心非垢淨垢淨不汙乃至迷悟凡聖行來去住並是妄識非心心本不生今亦無滅若知自心如此佛亦然而長沙偈曰學道之人不識真只為從前認識神無始時來生死本癡人喚作本來人今時邪禪乃相傳授以揚眉瞬目豎拂拈槌為極則佛法幾何不平沈哉圓覺經曰衆生妄見流轉厭流轉者妄見涅槃由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故謂脫有能入覺道者但成小乘非能入覺故曰非覺入故金剛般若經曰如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗傳曰如曰如來所得於是中無實無虗者達磨東來不言之意也而世罕能知之知之而罕能言之東坡曰如來得阿耨多羅三藐三菩提曰以無所得故而得舍利弗得阿羅漢道亦曰以無所得故而得如來與舍利弗若是同乎曰何獨舍利弗至於百工賤技承蜩意鉤履狶畫墁未有不同者也論道之大小雖至於大菩薩其視如來猶若天淵然及其以無所得故而得則承蜩意鉤履狶畫墁未有不與如來同者也東坡之言吾法如杜牧論兵曰如珠在盤至於圓轉橫斜不可得知所可知者珠不出盤耳如來應迹本以度生有法可傳則即時授與但與授記者明知無法可傳也棗柏曰華嚴第三會於須彌山頂上說十住表入理契智非生滅心所得至故如須彌山在大海中高八萬四千由旬非手足攀攬所及明八萬四千塵勞山住煩惱大海於一切法無思無為即煩惱海枯竭塵勞山便成一切智山煩惱海便成性海若起心思慮有所攀緣則塵勞山愈高煩惱海愈深不可至其智頂傳曰首楞嚴曰汝但棄其生滅守於真常常光現前根塵識心應時消落故維摩大士現神力即時須彌燈王佛遣三萬二千師子座高廣嚴淨來入維摩詰室諸菩薩大弟子釋梵四天王等昔所未見其室廣博悉包容三萬二千師子座無所妨礙寶覺禪師曰以師子座之高廣毗耶室之狹小佇思其間即成妨礙嘗問轉運判官夏倚汝言情與無情共一體時有狗臥香卓下乃以壓尺擊香卓又擊狗曰狗有情即去香卓無情即住如何得成一體倚不能對寶覺曰才入思惟便成剩法前聖所知轉相傳授皆此旨也而學者莫能明如言彈指而五百毒龍屈伏女子之定亦出尤昭著明白者也溈山嘗語仰山曰寂子速道莫入陰界而仰山曰慧寂信位亦不立豫恨仰山極力道不盡華嚴十地品曰生死皆由心所作心若滅者生死盡又曰隨順無明起諸有若不隨順諸有斷傳曰譬如有人畏影而逃日中其行愈疾而影愈隨休於樹陰則影自滅三尺童子知之而學者畏生死乃不息滅妄心是不類也又如日親君子則小人自疏日親小人則君子自遠市井庸人知之而學者畏流轉之苦甘隨順無明是首越而之燕者也夫知心寂滅則不復故起現行不與妄合則自然本智現前此二種第約之心耳非加功也三祖粲禪師既以大法付四祖信禪師乃祝曰慎勿言自我處得法來傳曰易解曰衆人之志不出於飲食男女之間與凡養生之資其資厚者其氣強其資約者其氣微故氣勝志而為魄賢聖則不然以志一氣清明在躬志氣如神雖祿之天下窮至匹夫無所損益也故志勝氣而為魂衆人之死為鬼而聖賢為神非有二知也志之所在者異也豫以其說觀三祖知其為志勝者也嵩禪師曰此蓋祖師以名迹為道之纍故雖師承亦欲絶之然則不言自粲公所得法便真非嗣祖者耶是大不然粲公於時念達磨可祖宏法之艱難皆為邪師憎害痛自慎耳便謂棄絶師承可乎黃蘗運禪師曰凡人臨欲終時但觀五蘊皆空四大無我真心無相不去不來生時性亦不來死時性亦不去湛然圓寂心境一如但能如是直下頓了不為三世所拘繫便是出世人也切不得有分毫趨向若見善相諸佛來迎及種種現前亦無心隨去若見惡相種種現前亦無怖畏但自忘心同於法界便得自在此是要節傳曰此黃蘗一時為裴相國之言也教其忘心當不必臨欲終時乃作此觀何以知之圓覺曰居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實故其偈曰末世諸衆生心不生虗妄佛說如是人現世即菩薩圭峯科以為忘心頓證豫以是觀前義知其為方便說也豫嘗閲運公遺事始名晞運會昌之厄以白帕蒙首易名神運宣宗登極復教仍名晞運此叢林未知者也入大乘論曰諸法體相世間現見云何言無耶曰凡愚妄見此非可信生滅之法皆悉是空生滅流轉無暫停時相似相續故妄見有實猶如燈𦦨念念生滅凡夫愚人謂為一𦦨傳曰涅槃曰如燈雖念念滅而有光除破暗冥念等諸法亦復如是如衆生食雖念念滅亦能令飢者而得飽滿譬如上藥雖念念滅亦能愈病日月光明雖念念滅亦能增長草木蓋一切諸法念念滅絶而今現見者相似相續故首楞嚴曰諦觀法法何狀則知但自燈明法自無暗明暗俱空無作無取明若有作不應容暗暗若可取不應受明今觀夜室之暗何自而來忽有燈𦦨暗何所往石頭曰當明中有暗者以明無作故當暗中有明者以暗無取故法華經曰世尊於一切衆前現大神力出廣長舌上至梵世傳曰溈山嘗曰凡聖情盡體露真常理事不二即如如佛而學者不能深味此語苟認意度而已譬如衆盲捫象隨所得之為是故象偏為尾為蹄為腰為牙而全象隱矣般若經曰無二無二分無別無斷故者真常也非凝然一物卓不變壞之常也而解法華者曰佛音深妙觸處皆聞超越凡聖則其舌廣長高出梵世此殆所謂隨語生解謬矣乎五十計較經曰菩薩問佛言罪生復滅何以我了不見佛問諸菩薩汝曹心寧轉生不諸菩薩報言我心轉生設我心不轉生亦不能與佛共語佛問諸菩薩言若心生時寧還自覺心生不諸菩薩言我但識見因緣時不覺初起生時佛言如汝所說尚不能知心初生時何能無罪傳曰諸菩薩疑既曰有罪我獨不見而世尊曰汝不能知心初生則罪有而不見也永明曰故知不察最初一念因成之假寧免後念相續成事之過乎吾以是知一切生死煩惱皆因不覺故若智為先導則咎何由生若了心外無法則情想不生不用加功直入不思議地也首楞嚴阿難偈曰消我億劫顛倒想不歷僧祇獲法身傳曰豫觀法華經諸菩薩摩訶薩從初涌出以諸菩薩種種讚法而讚於佛如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四衆亦皆默然五十小劫佛神力故令諸大衆謂如半日夫半日之間歷五十小劫顛倒想所持也唯識論問曰依信說有四種一現見二比知三譬喻四阿含此諸信中現信最勝若無外境云何世人言我現見此青黃等物乎答以偈曰現見如夢中見所見不俱見時不分別云何言現見諸凡夫人煩惱夢中有所見事皆如夢中如初見色不知色義後時意識分別然方了知以意識分別時眼等識已先滅故以一切法念念不住故以見色時未有意識意識起時即無眼等識傳曰譬如世人同看文字不識字者但見紙墨義理了不關思而識字者但見義理不礙紙墨也不識字者五識現量也而識字者意識之境也天台宗以五識名退殘謂是故也故曰見所見不俱夫紙墨文字所以傳義理義理得則紙墨文字復安用哉曹山正命食傳曰瑜伽師地論曰死有三種謂壽盡故福盡故不避不平等故當知亦是時非時死或由善心或不善心或無記心云何壽盡死猶如有一隨感壽量滿盡故死此名時死云何福盡故死猶如有一資具缺故死云何不避不平等故死如世尊說九因九緣未盡壽量而死何等為九謂食無度量食時不宜不消復食生而不吐熟而持之不近醫藥不知於己若損若益非時非量行非梵行此名非時死豫以是觀之乃知食而食即不枉死故名正命食黃蘗曰今時才出來者只欲多知多解廣求文義喚作修行不知多知解翻成壅塞唯多與兒酥乳消與不消都總不知三乘學道人皆此樣盡名食不消食不消者所謂知解不消皆為毒藥盡向生滅邊收真如之中無此事故以此知曹山貴正命食立三墮不斷聲色墮隨墮尊貴墮傳曰維摩經曰為壞和合相故應取食為不受故應受彼食以空聚想入於聚落所見色與盲等所聞聲與響等所嗅香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性本自不然今則無滅此不斷聲色墮所由立也又曰須菩提不見佛不聞法彼外道六師富蘭那迦葉末伽梨拘賒梨子刪闍夜毗羅胝子阿耆多翅舍欽婆羅迦羅鳩䭾迦旃延尼揵陀若提子等是汝之師因其出家彼師所墮汝亦隨墮乃可取食此隨墮之所由立也又曰謗諸佛毀於法不入衆數終不得滅度汝若如是乃可取食此尊貴墮之所由立也豫嘗深觀曹山其自比六祖無所愧以其蕩除聖凡之情有大方便南泉曰三世諸佛不知有黧奴白牯却知有乃不如曹山止言一墮字耳唐萬回和尚偈曰明暗兩忘開佛眼一本云黑白兩忘不繫一法出蓮叢真空不壞靈智性妙用恆常無作功聖智本來成佛道寂光非照自圓通傳曰首楞嚴曰緣見因明暗成無見不明自發則諸暗相永不能昏夫不因明塵而自發不為暗塵之所昏則佛眼開矣又曰餘塵尚諸學明極即如來夫以纖塵未盡則未至等妙所以貴不繫一法也佛眼既開則不受一法然寂光非照故首山臨終偈曰白銀世界金色身情與無情共一真明暗盡時俱不照日輪午後示全身果午後泊然而化黑白兩忘之效也淨業障經曰佛告比丘一切諸法本性清淨然諸凡夫愚小無智於無有法不知如故妄生分別以分別故墮三惡道傳曰如言以分別故墮三惡道則不分別遂成無上佛果乎曰不分別則機關木偶耳非能得道也維摩經曰無我無造無受者善惡之業亦不忘者遮凡夫愚小墮增益損減謗而密示無生之妙也永嘉曰誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成又曰了即業障本來空未了應須償夙債今推其效以盡其執情世間法殺人者死而怒波覆舟舟人皆死不聞水與風有罪出世間法先論因果故曰假使百千劫所作業不忘而野火燒山林禽蟲皆死而火亦速滅不聞火受三惡道苦可深思之雪峯禪師函蓋乾坤句截斷衆流句隨波逐浪句傳曰宗師約法以定綱宗以簡偏邪如雪峯三句玄沙嘗言之曰是汝諸人見有嶮惡見有大蟲刀劍諸事來逼汝身命便生無限怖畏恰如世間畫師自畫作地獄變相畫大蟲刀劍了好好地看著却自生怕怖亦不是別人與汝為過汝如今欲免此至惑麼但識取金剛眼睛若識得不曾教有纖塵可得露現何處更有虎狼刀劍解嗋嚇得汝直至釋迦如是伎倆亦覓出頭處不得所以我向汝道沙門眼把定世界函蓋乾坤不漏絲髮何處更有一物為汝知見如是出脫如是奇特何不究取此函蓋乾坤句也又曰鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後如壯士展臂不借他力如師子游行豈求伴侶此截斷衆流句也又曰大唐國內宗乘未有一人舉倡設有一人舉倡盡大地人失却性命無孔鐵鎚相似一時亡鋒結舌去汝諸人賴我不惜身命共汝顛倒知見隨汝狂意方有申問處我若不共汝與麼知聞去汝向什麼處得見我此隨波逐浪句也嵩山安國師曰作善則善現作惡則惡現真心即隱沒傳曰所言善現者百丈曰本有之性不可名目本來不是凡不是聖不是垢淨亦非空有亦非善惡若與諸染法相應名天人二乘界所言惡現者搜神記曰蛇千年則能斷已復續淮南子曰神蛇自斷其身而自相續隋煬帝遣使於嶺南瀕海窮山求此蛇長三尺許色錦文而似金熟視微黑解食肉而不毒人欲令自斷則觸之令怒若不勝憤則輒斷而為三四若刀截焉其皮骨之理亦有血怒定久乃又相就而相連續如故隋著作郎鄧隆曰此靈蛇也能自斷不必千歲夫天人二乘界例能他身飛升善念增長之力也蛇能自斷且千歲惡念增長之力也法華經曰無上兩足尊知法常無性佛種從緣起是故說一乘傳曰永明曰緣起佛種者報身佛非法身佛也不知永明何所據依而為此言經以一乘為言則寧當分別法報身乎所謂是法住法位者馬鳴所言隨順世間種種知故世間之相既曰種種則非以本自無性而皆從緣起何哉知其緣起而無生即是佛種所謂世間相常住者馬鳴所言一切法常靜無有起相豫童子時聞三峯靘禪師誦迦葉波偈曰諸法從緣生諸法從緣滅我師大沙門常作如是說心曉然愛之既落髮游方學道讀棗柏論曰有作之法難成隨緣無作易辦作者勞而無功不作隨緣自就無功之功功不虗棄有功之功功皆無常多劫積修終歸敗壞一念緣起無生超彼三乘權學等見於是頓見迦葉波說偈之意維摩謂文殊師利曰不來相而來不見相而見文殊師利曰如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所至去可見者更不可見與法華同旨也清涼國師答復禮法師所問真妄偈曰本淨本不覺由茲妄念起能迷非所迷安得長相似傳曰圓覺會上金剛藏菩薩所問世界始終生滅前後有無之故而世尊先令息滅妄心淨諸業障菩薩所問一切衆生本性清淨云何染汙而世尊但曰為有我人衆生及與壽命終不明告其所以然清涼言本淨本不覺則含其無性之旨深得世尊法施之式何以知之大經疏曰一切法有二一是所迷謂緣起不實故如幻也緣成故無性也二是能迷謂遍計無物故如空也妄計故無相也又以不覺故不知有以不信故不承當但起無明空成倒想耳棗柏曰十定品法門其定名入剎那際如三乘說八十生滅為一剎那八十剎那為一念此明三乘說如此一乘但以剎那是極短促思慮不及之故終不別論有生滅明如來出世始終不離剎那際為一乘道理情解有以情解者疑網不除且信佛語自疑不斷傳曰溈山問香嚴曰我不問汝經論義理種種知見汝但向父母未生前道取一句香嚴曰和尚替我道溈山曰道得即是我三昧於汝何益於是香嚴泣辭溈山曰畫餅不可充飢今生不復學識且作箇長行粥飯僧遂去止南陽菴以休息焉久之一日糞除瓦礫擊竹笑曰溈山大慈恩踰父母當日若為我說却何處有今日如香嚴乃可稱自疑已斷雲居宏覺禪師僧問如何是沙門所重宏覺曰心識不到處傳曰洞上宗旨語忌十成十欲犯犯則謂之觸諱如五位曰但能不觸當今諱也勝前朝斷舌才宏覺蓋洞山之高弟也而所答之語如此豈非觸諱乎曰東坡最能為譬嘗曰以吾之所知推至其所不知嬰兒生而導之言稍長而教之書口必至於忘聲而後能言手必至於忘筆而後能書此吾之所知也口不能忘聲則語言難於屬文手不能忘筆則字畫難於刻雕及其相忘之至則形容心術酬酢萬物之變忽然而不自知也夫不犯諱忌十成者法也宏覺不忘法何以能識宗金剛般若曰一切賢聖皆以無為法而有差別覺以之提婆曰稟明於心不假外也傳曰提婆菩薩博識強記才辨絶倫名震五天然猶以人不信用其言為憂天竺有大自在天人身真金色高二丈人有所求皆如所願提婆造廟見之萬衆隨入像果瞬視若怒提婆曰神則神矣何其小哉正當以威靈感人智德化物而假金為軀玻瓈為目以妖世非所望也即梯其肩鑿出目睛觀者疑之曰大自在天乃為一小婆羅門所折困耶提婆曉人曰神明遠大故以近事試我我得其心故敢爾也於是辦供是夜大自在天降以受之曰汝得我心人得我形汝以心供人以質饋知而敬我者汝畏而誣我者人然汝供甚美但乏我所欲提婆曰神須何物大自在天人曰我缺左目能施我乎提婆笑即出自己目與之愈出而愈不竭自旦及暮出目睛數萬神讚曰善哉摩衲真上施也欲何所求提婆曰我稟明於心不假外也豫嘗笑提婆顛倒既曰稟明於心不假外也則亦安用求神欲人信用其言乎方曰不假於外而求神如醉夫謂人曰吾平生不解飲也曹山本寂禪師偈曰從緣薦得相應疾就體消停得力遲瞥起本來無處所吾師暫說不思議傳曰豫以是觀之千聖皆稱此一念之心起時了不可得是真不思議也離則決定無別殊勝故如是了知豈不疾乎華嚴經曰以少方便疾成菩提曰然則學者何為而不信耶曰如竹林善會禪師為道吾發之以見船子言下省悟既去而回顧船子笑曰這漢疑我別有也於是覆其舟蓋信力尚微未大通透故耳法華經曰爾時龍女有一寶珠價值三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺傳曰棗柏曰此義如華嚴經所說即不然但使自無情見大智踰明萬法體真無轉變相如維摩經舍利弗謂天女曰何故不轉女身天女謂舍利弗我十二年來求女身相了不可得當何所轉菴提遮女謂舍利弗自男生我女當知萬法本自體如有何可轉如入法界品善財童子善知識文殊普賢比丘比丘尼長者童子優婆夷童女仙人外道五十三人各各自具菩薩行自具佛法隨諸衆生見身不同不云有轉若以法眼觀無俗不真若以世間肉眼觀無真不俗以法華經對權教三根見未盡者令我信種且將女相速轉成佛令生奇特方始發心趣真知見不堪本法而起善根此明且引三權令歸一實又破彼時劫定執三僧祇令於剎那證三世性本來一際無始無終稱法平等裂三乘之見網撤菩薩之草菴令歸法界之門入佛真實之宅故令龍女成佛明非過去久修年始八歲又表今非舊學轉女時分不逾剎那具行佛果無虧毫念法本如是自體無時權學三根自將見隔迷自實法反稱為他不知躬己本事如斯全處宅中猶懷滯見云何界外懸指僧祇此見不離定乖永劫回心見謝方始舊居何如今時滅諸見業徒煩多劫苦困方回如華嚴經法界緣起門明凡聖一真猶存見隔見存即凡情亡即佛稱性緣起俯仰進退屈伸謙敬皆菩薩行無有一法可轉變相有生住滅故不同龍女轉身成佛豫以謂龍旁生女有五障八歲非久積功力忽然之頃非歷塵劫乃化而成佛者超越諸趣脫離業果凌跨十世猛利成就之象也不欲正言故以象示意使學者自悟耳便以為實法較兩經而優劣之其可哉然則方等深經有正言之者乎曰首楞嚴曰金剛王寶覺彈指超無學華嚴曰超諸方便成十力是也永明禪師曰匿蹟韜光潛行密用傳曰明山賓困乏貨所乘牛既售受錢乃謂買者曰此牛經患漏蹄然療差已久恐後脫發無容不相語買者遽追受錢孔嵩家貧變姓名傭於阿里范式為牧伯行部到新野縣選嵩導騎迎式式見而識之呼嵩把臂謂曰非孔仲山耶對之嘆息欲與之俱載而去嵩以為先傭未竟不肯去大智度論曰譬如醫師治風狂人望見詬罵而醫師但欲驗其所施之術不恤其狂行人調心亦復如是故二祖大師既老出入市里混於淫坊酒肆之間有嘲之者答曰我自調心非干汝事此韜光密用者也金剛般若三性依他遍計圓成實智傳曰法華會上一切衆生喜見菩薩供養日月淨明德佛身服諸華香油滿千二百歲已香油塗身又以天寶衣而自纏身灌諸香油以神通力願而自然身光明遍照八十億恆河沙世界其中諸佛同時讚言善哉善哉善男子是真精進是名真法供養如來乃至作是語已而各默然其身火然千二百歲過是已後其身乃盡者離遍計執證人空智之象也作如是法供養已命終之後復生日月淨明德佛國中乃至日月淨明德佛告一切衆生喜見菩薩曰善男子我涅槃時到滅盡時至汝可安施牀座我於今夜當般涅槃即以海此岸栴檀為𧂐供養佛身而以燒之火滅已後收取舍利作八萬四千寶瓶以起八萬四千塔於是塔前然百福莊嚴臂七萬二千歲而以供養者離依他執得法空智之象也故天台曰身相既盡法執亦亡於時天人阿修羅等見其無臂憂惱悲哀而作是言此一切衆生喜見菩薩是我等師教化我者而今燒臂身不具足於是菩薩於大衆中立此誓曰捨我兩臂必當得佛金色之身若實不虗令我兩臂還復如故作是誓已自然還復者二執既盡證圓成實智然非滅絶身臂而證故曰還復如故蓋嘗深觀之盡身相則曰千二百歲十二緣生所成之業趣也盡法執則曰七萬二千歲七識染汙意所執持也身相以生言之法執以死言之身相法執不出於死生之域耳法華經曰如來明見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬傳曰僧問天台雲居智禪師曰性即清淨不屬有無因何有見答曰見無所見僧曰無所見因何更有見答曰見處亦無僧曰如是見時是誰之見答曰無有能見者僧曰究竟其理如何答曰汝知不妄計為有即有能所乃得名迷隨見生解便墮生死明見之人即不然終日見未嘗見求見處體相了不可得能所俱絶名為見性豫以是觀能所既絶則無生死生死既無則何有三界之相是謂明見也華嚴十定品曰爾時世尊在摩竭提國阿蘭若法菩提場中始成正覺於普光明殿入剎那際諸佛三昧以一切智自在神通力現如來身清淨無礙無所依止無有攀緣住奢摩他最極寂靜具大威德無所染著能令見者悉得開悟隨宜出興不失於時恆住一相所謂無相傳曰法華經曰世尊結加趺坐入於無量義處三昧身心不動而彌勒菩薩曰今佛入於三昧是不可思議以是觀之則所言無量者非多多無數量之謂也苟為數量之量則不應言處蓋無念礙之量耳何以知之以前文曰說大乘經名無量義教菩薩法佛所護念不言處也推十定品所示入剎那際諸佛三昧同旨至於隨宜出興不失於時則善用其心者也起信論曰真實空者從本以來一切染法不相應故離一切法差別相故無有虗妄分別心故應知真如非有相非無相非有無相非非有無相非一相非異相略說以一切衆生妄分別心所不能觸故立為空據實道理妄念非有空性亦空以所遮是無能遮亦無故言真實不空者由妄念空無故即顯真心常恆不變清淨圓滿故名不空亦無不空相以非妄念心所行故唯離念智之所證故傳曰豫觀江西馬祖而下諸奇衲如汾州南泉歸宗百丈皆冠絶一時然說法與諸祖議論冥契者百丈又冠諸衲嘗曰但了諸法不自生皆從自己一念妄想顛倒取相而有知心與境不相到當處解脫一一諸法當處寂滅當處道場本有之性不可名目本來不是凡不是聖不是垢淨亦非空有亦非善惡若與諸染法相應名天人二乘界若垢淨心盡不住繫縛不住解脫無一切有為無為縛脫平等心量處於生死其心自在畢竟不與諸虗妄塵勞蘊界生死諸入和合迥然無計一切不拘去留無礙往來生死如門開相似此論與馬鳴所示無所優劣然深信而親證者首山念法華舜峯欽禪師尤昭著者也金剛般若經曰須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心傳曰楞伽經曰一切法不生我說剎那義夫言法本不生足矣安用復名剎那義乎法華經曰諸法空為座夫言諸法空足矣安用復稱座乎曰但言諸法本不生與言諸法空者即是斷滅見故以不生而言剎那諸法空而言座也所言應無所住而生其心蓋三世如來法施之式也永嘉尊者曰取不得捨不得不可得中只麼得傳曰可以取則法身有剩可以捨則虗空可逃離是取捨之心則如絮毬百衲置之閒處天寒歲晚有時而得用也莊周非能知此者也而其言有可觀曰黃帝遊於赤水之北登崑崙之丘南望遺其玄珠使智索之而不得使離婁索之而不得乃因罔象而得之黃帝曰異哉罔象乃可得之問曰莊周既曰非能知之則其語何其似之親耶曰牛乳驢乳其色俱白牛乳則能出生酥酪至於驢乳裂之則成滓穢然不識牛乳者指驢乳似之故豫不廢莊周之論也毗舍浮佛偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅傳曰首楞嚴曰由塵發知因根有相相見無性猶如交蘆夫知由前塵而發者所謂見分也相因眼根而有者所謂相分也相見俱無有性者心境互生各無自體心不自立故由塵發知境不自生故因根有相二虗相倚故猶若交蘆維摩經曰無我無造無受者善惡之業亦不亡豫政和元年十月謫海外明年三月館於瓊州之開元寺儼師院海上無經籍壁間有此偈日夕研味頓入無生身心超然自得也復禮法師曰觀業者業因心起心為業用業引心而受形心隨業而作境然則因業受身身還造業從心作境境復生心若影隨形而曲直猶響隨聲而大小矣傳曰廣百論偈曰眼中無色識識中無色眼色內二俱無何能令見色僧靈潤嘗修此觀曰捨外塵邪執得意言分別捨唯識想得真法界前觀無相捨外塵相後觀無生捨唯識想嘗與法侶登山游覽野火四合衆皆奔散潤獨安步顧陟謂法侶曰心外無火火實自心謂火可逃寧能免火及火至潤而潛然息滅楞伽經偈曰由自心執著心似外境轉彼所見非有是故說唯心傳曰曹溪六祖隱晦時號盧居士嘗客廣州精舍夜經行聞兩僧論風幡之義一曰風動一曰幡動六祖前曰肯使流俗輒預高論否正以風幡非動仁者心動耳法空禪師深居五臺山每夜必聞有聲名曰空禪法空患之久而自悟曰皆我自心之境安有外聲哉以法遣之自後遂絶夫言彼所見非有者以風幡相待無有定屬以無定屬緣生則名無生六祖所示見境既爾則空禪所悟聞塵亦然首楞嚴曰見聞如幻翳三界若空華聞復翳根除塵消覺圓淨淨極光通達寂照含虗空却來觀世間猶如夢中事者詎不信夫華嚴經曰佛子如來以一切譬喻說種種事無有譬喻能喻此法何以故心智路絶不思議故傳曰杜順和尚文殊師利菩薩之化身也作法身偈曰懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上傅大士彌勒菩薩之化身也亦作法身偈曰空手把鋤頭步行騎水牛人從橋上過橋流水不流過去古佛開示之語如此而學者望之如壁立萬仞非手足攀攬之境幽州盤山積禪師曰若言即心即佛今時未入玄微若言非心非佛猶是指蹤之極則向上一路千聖不傳學者勞形如𤠔捉月積公逮庶幾知此乎楞伽經曰前聖所知轉相傳授妄想無性傳曰無性之妙佛祖所祕蓋嘗密演未嘗顯說何以知之圓覺曰圓覺自性非性性有循諸性起無取無證維摩曰不生不滅是無常義十地品曰以不了第一義故號為無明起信曰以不如實知真如法一故不覺而有妄念夫言非性性有不生滅而無常及不了知皆以無性故也而其言皆遮之者欲學者自悟此豫所謂密演者也今則明告無性是謂顯說法華經曰入如來室著如來衣坐如來座爾乃應為四衆廣說斯經如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是安住是中然後以不懈怠心為諸菩薩及四衆廣說是法華經傳曰室者常寢處衣者常被服座者常休息故知傳佛心宗者常寢處於慈悲被服於忍辱休息於法空故曰安住是中也永明曰食肉者斷大慈悲種不可不慎太平興國中建陽僧辨聰游五臺山寺寺之上座僧老為衆輕易聰獨敬事之將還京師老僧付聰書使於城北尋勃賀投之聰辭去竊發而觀無他詞但曰度衆生畢蚤來蚤來若更強住却恐造業聰大驚復緘封之既至於廣濟河側聞小兒呼勃賀聰問勃賀何在小兒指大豬豬項丳金環臥街西牆下聰扣牆問屠誰氏曰趙生家也問此豬何名勃賀曰唯食勃荷故里中小兒以名之吾日烹千百豬豬奔佚難驅以此豬引導之則纍纍就死畜之十五年矣聰以書投之勃賀急食忽然人立而化維摩經曰居士即以神力空其室內除去所有及諸侍者唯置一牀以疾而臥傳曰百丈大智禪師曰夫學道人若遇種種苦樂稱意不稱意事心無退屈不念一切名聞利養不貪一切功德利益不為世間諸法所滯礙唯無親無愛苦樂平懷粗衣遮寒糲食活命兀兀如愚如聾如啞稍有相應分黃蘗運禪師曰唯置一牀寢疾而臥者心不起也如人臥疾攀緣俱息妄想歇滅即是菩提耆域以晉惠帝時至洛陽萬僧為作禮斂眉曰汝等衣服華飾皆違法制非佛意也漢范曄有言曰事苦則矜全之情薄生厚故安存之慮深登高不懼者胥靡之人也坐不垂堂者千金之子也大涅槃經曰所言二諦其實是一方便說二如人醉未吐見日月轉謂有轉日及不轉日醒人但見不轉不見於轉轉二為粗不轉為妙傳曰三藏全是轉之二如彼醉者大乘經帶一轉二而說不轉之一也起信曰以一切法本來唯心實無於念而有妄心不覺起念見諸境界故說無明以此義例轉二為粗也又曰心性不起即是大智慧光明義例不轉為妙也洞山清稟禪師唯宴坐一日呼侍者下法堂謂曳木者無損階砌侍者出視無有還白寂無人迹稟又使求之侍者臨簷俯視乃羣蟻曳蜻蜓翼緣階而上蓋靜極妙而靈知也華嚴經曰一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力傳曰棗柏曰世尊在摩竭提國阿蘭若法菩提場中始成正覺於普光明殿入剎那際三昧明以法界身為定體無三世性故從兜率天下降神及入涅槃四十九年住世轉一切法輪總不出剎那際以此三昧圓通始終非三世古今故如是敘致以總言之一切過去現在未來諸佛皆盡一智成佛并衆生生死亦不移剎那際但衆生妄計有年歲長短如佛所說即生即死皆不移時夫隨情言說無有實義以濟迷倒謂之方便若出情之法則不然但入剎那際三昧即成無上覺道解深密經曰翳眼人如遍計現青黃如依他淨眼如圓成傳曰分別性如蛇依他性如藤若人緣四塵相分析此藤但見四相不見別藤但見色香味觸相故藤非實有以離四塵外無別有藤所以偈曰於藤起蛇知見藤則無境若知藤分已藤知如蛇知若知藤之性分是空則例如藤上妄生蛇想故傅大士偈曰妄計因成執迷繩為是蛇心疑生暗鬼眼病見空花一境雖無異三人乃見差了茲名不實長馭白牛車起信論曰以取一切衆生如己身故而亦不取衆生相此以何義謂如實知一切衆生及與己身真如平等無別異故以有如是大方便智除滅無明見本法身自然而有不思議業種種之用即與真如等遍一切處傳曰若真能敬重自己佛性即於一切衆生以交神之道見之何以故以我與衆生無差別故比丘辰巳之間齊者以與衆生接不得不齊易同人卦曰文明以健中正而應君子也文明禮也粲然與物接而健違之中正德也介然與物辨而應從之與物接而違與物辨而從此君子所以同人之際不可得而親疏也龍興宗靖禪師初參雪峯宗承印可乃自誓充飯頭服勞餘十載嘗於衆堂中袒一膊釘簾雪峯覩而記曰汝向後住持有千僧其中無一人衲子也靖悔過辭歸台州住六通院錢王請居龍興寺有衆千餘唯三學講誦之徒果如雪峯所志楞伽經曰佛告大慧為世間以彼惑亂諸聖亦現而非顛倒大慧如春時𦦨火輪垂髮乾闥婆城幻夢鏡像世間顛倒非明智也然非不現傳曰涅槃經曰迦葉菩薩白佛言世尊若以因此煩惱之想生於倒想一切聖人實有倒想而無煩惱是義云何佛言善男子云何聖人而有倒想迦葉菩薩言世尊一切聖人牛作牛想亦說是牛馬作馬想亦說是馬男女大小舍宅車乘去來亦爾是名倒想善男子一切凡夫有二種想一者世流布想二者著想一切聖人唯有世流布想無有著想一切凡夫惡覺觀故於世流布生於著想一切聖人善覺觀故於世流布不生著想是故凡夫名為倒想聖人雖知不名倒想蓋境本自空何須壞相而心虗自照豈假緣生乎以是一切聖人不同凡夫能所情執知見也廣博嚴經曰佛令阿難遍告諸比丘使集聽法阿難承佛慈旨報已復還佛所而白佛言是諸比丘言我等見祇陀林中大水盈滿大光普照房舍園林悉不復現以是事故悉來不得佛告阿難彼諸比丘於非水中而作水想不唯於非水中而作水想亦於非色中而作色想非受想行識中而作受想行識想此所謂以彼惑亂惡覺觀故於世流布生於著想也華嚴經曰智入三世而無來往傳曰棗柏曰此華藏世界海明此教法一念三世故一念者為無念也無念即無三世古今等法以明法身無念一切衆生妄念三世多劫之法不離無念之中以是義故此華藏世界所有莊嚴境界能現諸佛業衆生三世所行行業因果總現其中或過去業現未來中或未來業現過去中或過去未來業現現在中或現在業現過去未來中如百千明鏡俱懸四面前後影像互相徹故為法界之體性無時故妄計三世之業頓現無時法中故經曰佛子汝應觀察剎種威神力未來諸國土如夢悉令現十方諸世界過去國土海咸於一剎中現像猶如化三世一切佛及以其國土於一剎種中一切悉觀見乃作偈曰三世無有時妄計三世法以真無妄想一念現三世三世無時者亦無有一念計著三世法總現無時中了達無時法一念成正覺西域記曰有隱士廬深山中得神術能黃金瓦礫但未能馭風騎氣耳久之有授以飛升法者當𡎺壇使烈士抱長劍立壇隅屏息達旦隱士乃自誦祕呪然後當仙去隱士後得烈士傾意待之烈士願效力為報隱士曰但欲汝為我一夕不語耳烈士許諾曰死且不辭矧不語乎於是依法行事將曉矣烈士忽大叫空中火墮烟𦦨蓬勃隱士引之蒼黃入水以避讓之曰誡子無聲乃驚叫何也烈士曰受命之後昏然如夢見昔所事主人責以不語欲不利我以受恩深厚終不答遂為所殺托生南印土大婆羅門家追惟厚恩自少及壯終以默然俄生一子其妻曰汝若不語即殺此兒自念事已隔生不忍令殺因止之遂發言隱士曰魔所嬈也遂激恚而死參同契曰當明中有暗勿以暗相遇當暗中有明勿以明相覩明暗各相對比如前後步萬物自有功當言用及處傳曰萬物若有功則所言當至其處如鉗取物如日舒光如呼火則口吻為所燒明暗若有功則如人行步舉左足即右足隨之以明暗無體性萬物無功勳故為是論也寶積經曰佛言譬如然燈一切黑暗皆自無有無所從來去無所至非東方來去亦不至南西北方四維上下不從彼來去亦不至而此燈明無有是念我能滅暗但因燈明法自無暗明暗俱空無作無取首楞嚴曰譬如虗空體非諸相而不礙彼諸相發揮蓋於日用不隔絲毫圓覺經曰居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實彼諸衆生聞是法門信解受持不生驚畏是則名為隨順覺性傳曰此一段義敘五性差別然前文必結曰此名凡夫隨順覺性此名菩薩未入地者隨順覺性此名菩薩已入地者隨順覺性此名如來隨順覺性至於此則曰隨順覺性而已何也曰世尊之意欲學者出情離見非特此經如法華經曰如此種種羊車鹿車牛車今在門外及其安隱得出則各賜諸子等一大車夫未出火宅則三車有羊鹿牛之名既出矣即沒其牛名但曰大車亦此意也歟琅瑘覺禪師嘗問講僧曰如何居一切時不起妄念對曰起即是病又問如何是於諸妄心亦不息滅對曰息即是病又問如何是住妄想境不加了知對曰知即是病又問如何是於無了知不辨真實對曰辨即是病覺公笑曰汝識藥矣然未識藥中之忌也寶覺禪師則為之偈曰黃花熳熳翠竹珊珊江南地暖塞北春寒遊人去後無消息留得雲山到老看洞山悟本禪師所立正中妙挾挾路通宗通塗挾帶傳曰百丈曰依文解義三世佛冤離經一字即同魔說故教外宗旨其所開示必曰藉教如言妙挾則曰正中如言挾路則曰通宗如言挾帶則曰通塗蓋本一挾帶而加妙字耳然挾帶之語必有根本大乘所緣緣義曰言是帶己相者帶與己相各有二義言帶有二義者一者挾帶即能緣心親挾境體而緣二者變帶即能緣心變起相分而緣也曹山見杜順法身頌曰我意不欲與麼道乃自作之曰渠本不是我我本不是渠渠無我即死我無渠即餘渠如我是佛我如渠即驢不食空王俸何假鴈傳書我說橫身倡君看背上毛乍如謠白雪猶恐是巴歌豫觀曹山之語皆妙挾也語不挾帶則如能緣之心不挾境體則是渠無我我無渠血脈斷緣世流布想耳非宗旨也破色心論曰云何得知諸佛如來依此義故說有色等一切諸入而非實有色等諸入又以識等能取境界以是義故不得說言無色等入答曰偈言彼一非可見多亦不可見和合不可見是故無塵法傳曰無著菩薩曰此義不然何以故有三義故無色等入何等為三一者為實有一微塵如彼外道衛世師等虗妄分別離於頭目身分等外實有神我微塵亦爾言有神我而不可得見離色香等實有不耶二者為實有多微塵差別可見不耶三者為多微塵和合可見不耶此明何義若實有彼一微塵者則不可見如彼外道衛世師等虗妄分別離於頭目身分等外有一神我不可得見微塵亦爾離色香等不可得見是故無一實塵可見是故偈言彼一非可見故若實有多微塵差別者應一一微塵歷然可見而不可見以是義故多塵差別亦不可見是故偈言多亦不可見故若多微塵和合可見者此亦不然何以故以一微塵實無有物云何和合是故不成是故偈言和合不可見是故無塵法中觀論偈曰諸法不自生亦不從他生不共不無因是故說無生以此偈意觀前無塵之論曉然如視白黑矣百門義海曰達無生者為塵是心緣心為塵因因緣和合幻相方生由從緣生必無自性何以故今塵不自緣起待於心心不自心必待於緣由相待故則無定屬以無定屬緣生則名無生非去緣生說無生也論曰因不自生緣生故生緣不自生因生故色今因緣生方得名生了生無性方是無生然生與無生互成互奪奪即無生成即緣生由即成即奪是故生時無生如是了者名達無生也傳曰僧伽難提尊者至摩提國見伽耶舍多尊者時伽耶方為童子既與剃落聞風吹殿銅鈴聲僧伽難提問曰鈴鳴耶風鳴耶伽耶舍多曰非風非鈴我心鳴耳曰心復誰乎伽耶舍多曰俱寂靜故於是僧伽難提尊者曰善哉善哉繼吾道者非子而誰即付法偈曰心地本無生因地從緣起緣種不相妨華果亦復爾其後伽耶舍多至大月氐國見鳩摩羅多付法作偈曰有種有心地因緣能發萌於緣不相礙當生生不生維摩經曰何謂病本謂有攀緣從有攀緣則為病本何所攀緣謂之三界云何斷攀緣以無所得若無所得則無攀緣傳曰瑜伽師地論曰如經言清淨行苾芻於時時間正作意思惟五相乃至廣說方便勤修增上心者乃得名為清淨行諸惡不善欲等尋思及親里等所有尋思皆於此行為障礙故唐方士邢和璞嘗與房琯游至夏口佛祠和璞使人钁於古松之下得大甕甕中有畫一軸展視之乃婁師德永禪師像也和璞謂琯曰能憶此乎琯罔然不知和璞令靜默少頃琯忽自見其身為永禪師也溈山祐禪師住山久自乃知前身嘗為越州村寺誦法華經僧也法華經曰大通智勝佛十劫坐道場佛法不現前不得成佛道傳曰經蓋嘗言若人散亂心入於塔廟中一稱南無佛皆已成佛道豈一部之經首尾自相違戾曰豫論此經蓋皆象也聖人非不欲正言以有不可勝言者唯象為能盡其意佛意以智身不可以三昧處求故也以智體無所住無所依故若生想念願樂見之即如所應現無有處所依止故猶如空谷響但有應物之音若呼之即應無有處所可得故華嚴經曰有欲見普賢身及座者但生想念是也夫於散亂心時一念佛號便得覺道但生想念即見普賢而十劫在定謂佛法不現遍會推求謂普賢不見非鈍根所知之境也大法炬陀羅尼經曰復次應觀是色作無相想云何觀色作無相想當知此色生滅輪轉念念不停毗舍佉如是色相不可眼見當知彼是意識境界唯意所知是故不可以眼得見傳曰護法菩薩曰五識唯緣實五塵境不緣假法以任運而緣不作行解不帶名言是現量故如眼識緣青黃赤白等實色之時其長短方圓之假色雖不離青黃赤白等實色之上然眼識但緣實不緣假也既不緣假則是意識作長短方圓之心而緣也蓋五識之初念與明了意識緣五塵境之時唯是現量得五塵之實色若後念分別意識起時即是行解心中作長短方圓之色而緣是比量心緣也故經曰當知彼是意識境界唯意所知是故不可以眼得見奉先慧超禪師每曰大衆見聞覺知只可一度其有得於此乎般若波羅蜜多心經曰照見五蘊皆空度一切苦厄傳曰華嚴十萬偈而十地品第六地唯論十二緣生十二緣生者三苦已成之軀是也首楞嚴十卷披剝根境詳矣而其終特言五蘊亦三苦已成之軀是也佛意若曰吾之法妙不出衆生日用使學者於凡夫身實證耳如與阿難微細推檢陰入界處一一皆空非因非緣非自然性夫非因即是不自生也非緣即是不他生也既不自生又不因他則安有和合即是不共生也非自然性即是非無因生也四句無生界從何有也永嘉曰明識一念之中五陰者謂歷歷分明即是識陰領納在心即是受陰心緣此理即是想陰行用此理即是行陰穢汙真性即是色陰此五陰者舉體即是一念一念者舉體全是五陰歷歷見在一念之中無有主宰即是人空慧見如幻化即是法空慧豫觀永嘉之談五蘊如駭雞犀之枕四面視之其形常正蓋無師自然智所成就也起信論曰當知一切法不可說不可念故名為真如問曰若如是義者諸衆生等云何隨順而能得入答曰若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入傳曰以方便觀其說并念皆無能所謂之隨順而觀行深久妄念自離則契彼無念真理謂之得入夫言若離於念名為得入而論者曰方便觀法久自離念者為鈍根說也據佛祖本意即不如是豫聞雲門偃禪師初扣陳尊宿之門尊宿開門把住曰道道速道速道偃擬議尊宿托開曰秦時𨍏轢鑽雲門於是大悟於言下如雲門可名得入也黃龍寶覺禪師作老黃龍生日偈曰昔人去時是今日今日依前人不來今既不來昔不往白雲流水空悠哉誰云稱尺平直中還有曲誰云物理齊種麻還得粟可憐馳逐天下人六六元來三十六傳曰法華經曰時富長者於師子座見子便識心大歡喜即作是念我財物庫藏今有所付我常思念此子無由見之而忽自來甚適我願我雖年朽猶故貪惜即遣傍人急追將還爾時使者疾走往捉窮子驚愕稱怨大喚我不相犯何為見捉使者執之愈急強牽將還於時窮子自念無罪而被囚執此必定死轉更惶怖悶絶躃地又常不輕菩薩不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛四衆之中有生瞋恚心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虗妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛說是語時衆人或以杖木瓦石而打擲之避走遠住猶高聲唱言我不敢輕於汝等汝等皆當作佛夫窮子追之即躃地常不輕直告之即被捶罵是二者不知直中有曲種麻得粟者也金剛三昧經偈曰法從分別生還從分別滅滅是諸分別是法非生滅傳曰中觀論曰無物從緣起無物從緣滅起唯諸緣起滅唯諸緣滅以是知色生時但是空生色滅時但是空滅譬如畫水成文未嘗生滅玄沙曰鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後此真緣起無生之旨也肇論曰觀方知彼去去者不至方傳曰此明三時無去來以辨不遷也如人初在東方立即名未去故未去不得名為去若動一步離本處反望東方名已去故已去不得名為去或入便轉計云動處則有去此中有去時非已去未去是故去時去龍勝所論正破此執曰若有已去未去則有去時若無已去未去則無去時故偈曰離已去未去去時亦無去如因兩邊短有中間長若無邊短即無中間長也於是以偈斷之曰已去無有去未去無有去離已去未去去時亦無去法華經偈曰狐狼野干咀嚼踐踏嚌嚙死尸骨肉狼籍傳曰狐貪而疑狼貪而很野干貪而癡疑則癡之別很則瞋之別即三毒雜相也咀嚼踐踏言於不淨之境味著不厭蹈籍不離也嚌嚙死尸骨肉狼籍言於無常之身計較不捨紛亂不攝也豫論此經皆象象以盡意欲衆生深觀自悟耳入楞伽經曰諸法無法體我說唯是心不見於無心而起於分別傳曰以此偈觀之則凡見自心者皆無分別矣而可乎曰如世幻師幻作男女牛馬而觀者皆生著想獨幻師無著想了是自心所生故又如良馬見物輒驚獨見自影而無所驚知從身所出故以是義故知雖分別不礙明見自心也瑜伽師地論勝義伽陀者如經言都無有主宰及作者受者諸法亦無用而用轉非無唯十二有支蘊處界流轉審思此一切衆生不可得於內及於外是一切皆空其能修空者亦常無所有我我定非有由顛倒妄計有情我皆無唯有因法有諸行皆剎那住尚無況用即說彼生起為用為作者眼不能見色耳不能聞聲鼻不能嗅香舌不能嘗味身不能覺觸意不能知法於此亦無能住持驅役者法不能生他亦不能自生衆緣有故生非故新新有法不能滅他亦不能自滅衆緣有故生生已自然滅由二品為依是生便可得恆於境放逸又復邪升進愚癡之所漂彼逐邪升進諸貪愛所引於境常放逸由有因諸法衆苦亦復然根本二惑故十二支分二自無能作用亦不由他作非餘能有作而作用非無非內亦非外非二種中間由行未生故有時而可得設諸行已生由此故無得未來無有相過去可分別分別曾所更非曾亦分別行雖無有始然有始可得諸色如聚沫諸受類浮泡諸想同陽𦦨諸行喻芭蕉諸識猶幻事日親之所說傳曰彌勒菩薩曰此中依補特伽羅無我勝義宣說如是勝義伽陀為欲對治增益損減二邊執故於所攝受說為主宰於諸業用說為作者於諸果報說為受者如是半頌遮遣別義所分別我諸法亦無用者遮遣即法所分別我由此遠離增益邊執而用轉非無者顯法有性由此遠離損減邊執用有三種一主宰用二作者用三受者用因此用故假立主宰作者受者所言二品者無明乃至受愛乃至老死也無明至受者有因諸法者也愛至老死者有因衆苦者也然豫觀所言即說彼生起為用為作者乃是提無生法之綱領也玄沙有用處不換機句傳曰夫以言逐言以理遣理皆世流布想非能見道楞伽經曰如楔出楔如玄沙嘗曰學者當用處不換機而雖老於叢林者亦莫識此語可嘆也玄沙嘗食荔支問衆曰這箇荔支得與麼紅這箇荔支得與麼赤你諸人且作麼生若道一色又是儱侗若道是衆色只成箇斷常你諸人且作麼生彥瑫曰也只和尚自分別玄沙曰這儱侗愚癡有什麼交涉沖機曰都來只是一色玄沙曰總與麼儱侗有什麼了時乃回顧問皎然汝作麼生道皎然曰不可不識荔支玄沙曰只是荔支又曰汝諸人如許多時在我這裏總與麼說話不辨緇素不識吉凶我比來向汝道用處不換機因什麼只管對話有什麼交涉道巘禪師曰先聖憫汝顛倒馳逐將一句子解落汝知是這般事掉放閒處自著些筋力卻於機語上答出話頭將作禪道非唯自賺亦乃賺他華嚴經曰如是自性如幻如夢如影如像悉不成就傳曰以真如之性法爾隨緣雖即隨緣法爾歸性以隨緣時似有顯現如觀幻法不有而有如觀夢境不見而見如觀水中之影非出非入如觀鏡中之像不內不外以無性隨緣故理不成就以隨緣無性故事不成就理事不成則一切法俱不成也六祖為至徹禪師說常無常義曰無常者即佛性也有常者善惡一切諸法分別心也徹曰如和尚所說大違經文也六祖曰吾傳佛心宗豈違佛經徹曰經說佛性是常和尚卻言無常善惡諸法乃至菩提心皆是無常和尚卻言是常此豈不相違令學人轉加疑惑六祖曰汝知不佛性若常更說什麼善惡諸法乃至窮劫無有一人發菩提心者故吾說無常正是佛說真常之道也又一切諸法若無常者即物物皆有自性容受死生而真常性有不遍之處故吾說常者正是佛說真無常義也佛比為凡夫外道執於邪常諸二乘人於常計無常共成八倒故於涅槃了義教中破偏見而說真常真樂真我真淨也汝今依言背義以斷滅無常及確定死常而錯解佛之圓妙最後微言縱覽千遍有何所益於是至徹大悟於言下瑜伽師地論曰法光明能治三種黑暗由不如實知諸法故於去來今多生疑惑於佛法等亦復如是此中無明及疑俱名黑暗又證觀察能治昏沈睡眠黑暗以能顯了諸法性故傳曰百門義海曰顯光明者為見塵法界真如理事之時顯了分明此是智慧光明照也若無智光明理事不顯但見法時即是光明由積智功圓是故放一光明則法界無不顯示常觀察一切法界是為放光明照一切也藏公可謂能如實知諸法也彌勒菩薩教令學者曰睡當纍足作光明想寶積經曰法光明門而能出生諸法理趣善巧方便亦能出生一切法印能入一切法印之門於一切法所應作者能了能入於法光明能得能說以法光明隨順趣入諸法明門永嘉偈曰惺惺寂寂是無記寂寂非寂寂惺惺是亂想惺惺非傳曰六祖嘗謂衆曰吾有一物無頭無尾無名無字無背無面諸人還識不神會者出曰是諸佛之本源神會之佛性祖曰向汝道無名無字汝便喚作本源佛性他日汝但作知解宗徒又嘗令道明安坐曰不思善不思惡正當與麼時阿那箇是明上座本來面目而道明乃悟旨自是觀之祖師未嘗肯以是法印人而永嘉顯告曰惺惺寂寂是則過矣而不可以不辨幽州盤山寶積禪師知此意有所垂示則曰心月孤明光吞萬境光非照境境亦非存光境俱忘復是何物至於騰騰作一鉢歌曰萬代金輪聖王子只這真如靈覺是菩提樹下度衆生度盡衆生出生死不死不生真丈夫無形無相大毗盧塵勞滅盡真如在一顆圓明無價珠騰騰殆可以嗣永嘉也溈山祐禪師曰學道人慎弗令心地掩染但約莫衆苦盡即是佛心傳曰所言衆苦者冤憎會苦愛別離苦五陰重苦乏受用苦聲色流轉苦求不得苦衆生違害苦等然皆情也棗柏曰凡聖體真唯存見隔見存則凡情忘則佛唯此至言先聖不能加毫末於此矣而深信之者世罕見其人如林陽瑞峯志端禪師其殆庶幾乎開寶元年八月作偈曰明年二月二與汝暫相棄灰骨撒長江勿占檀那地明年正月草八日道俗入山端笑迎甚歡二月初吉郡官俱集連宵如市至日升座辭衆有圓應長老者出問曰雲愁霧慘大衆烏乎願賜一言未須告別端垂一足應曰法鏡不臨於此土寶月又照於何方端曰非君境界應曰恁麼則漚生漚滅還歸水師去師來事本常端作噓聲乃問四衆曰世尊滅度是何時節衆曰二月十五日子時端曰吾今日午時言卒而化圓覺經曰淨諸業障菩薩問曰若此覺心本性清淨因何染污使諸衆生迷悶不入而世尊但答曰衆生從無始來妄想執有我人衆生及與壽命傳曰棗柏曰如起信論曰不思議業相者以依智淨能作一切勝妙境界所謂無量功德之相常無斷絶隨衆生根自然相應種種而現得利益故又曰依本覺上而起覺故又曰依於智故生其苦樂如起信論廣明一切衆生迷根本智而有世間苦樂故為智無性故隨緣不覺苦樂業生為智無性故為苦所纏方得自覺根本無性衆緣無性萬法自寂若不覺苦時以無性故總不自知有性無性如人因地而倒因地而起問曰一切衆生本有不動智何故不自應真常淨何故隨染答曰一切衆生以此智故而生三界者為智無性不能自知是智非智善惡苦樂等法為智體無性但隨緣現如空谷響應物成音無性之智但應緣分別以分別故癡愛隨起因癡愛故即我所病生有我所故自他執業便起因執取故號曰末那以末那執取故名為識因識種子生死相續以生死故衆苦無量以苦無量方求不苦之道迷不知苦者不能發心知苦求真者還是本智會苦緣故方能知苦不會苦緣不能知苦知苦緣故方能發心求無上道瑜伽師地論曰又諸衆生將命終時乃至不到昏昧想位長時所習我愛現前由此力故謂我當無便愛自身由此建立中有生報若預流果及一來果爾時我愛亦復現行然此預流及一來果於此我愛由智慧力數數推求制而不著猶如壯夫與羸劣者共相捔力能制伏之當知此中道理亦爾若不還果爾時我愛不復現行傳曰圭峯禪師曰當以空寂為自己勿認色身以靈知為自心勿隨妄念妄念若起都莫隨之自然臨命終時捨短為長易粗為妙學者能令此觀常在現行則是真智慧之力也今皆不然徒循其名輕道甚矣唐明皇至蜀與裴士淹論數十人無不當至李林甫則曰是子妬賢嫉能舉無比者由是知明皇知林甫之不可用而用也知不可用而用之者明皇有輕天下之心故也至德宗與陸贄論盧𣏌則曰天下皆知𣏌奸而朕獨不知何也夫德宗不知𣏌奸者輕道也苟知敬道則必自反而求天下之理天下之理得則奸邪安能昧之哉明皇之輕天下德宗之輕道皆致大盜以亂天下例禪者不能以智慧之力破滅無明至老死而不暇悲夫法華經曰汝等莫得樂住三界火宅勿貪粗弊色聲香味觸也若貪著生愛則為所燒傳曰頭藍弗以世俗智伏下地惑獲非想定具五神通時君尊敬迎入宮掖女子接足而禮頭藍弗觸女子手遂生貪欲便失神通飯食訖徐步歸山故偈曰才生一念欲便失五神通圓覺經曰譬如眼光曉了前境其光圓滿得無憎愛傳曰第六識動有分別不動即等周法界五現量識等一一根皆遍法界眼見色時色不可得元來等法界耳鼻舌身一一亦復如是五識現量名曰圓成永明曰初居圓成現量之中浮塵未起後落明了意根之地外狀潛形謂是故也楞伽經偈曰乃至有所立一切皆錯亂若見唯一心是則無諍訟傳曰韓退之問大顛師壽幾何大顛提數珠示之曰晝夜一百八退之罔然退問第一座曰老和尚言晝夜一百八意旨如何第一座叩齒而已他日復見大顛問曰晝夜一百八意旨如何大顛亦叩齒於是退之喜曰乃今知佛法無二道也嘗問首座首座見答亦同耳於是大顛召第一座問之信然大顛杖而逐之汾陽偈曰解展機鋒是大顛明知不是小因緣一般叩齒叢林異出院韓公始得間永明曰龐居士問馬祖如水無筋骨能勝萬斛舟時如何答曰我此間亦無水亦無舟討甚筋骨德山至龍潭久嚮龍潭及至到來潭又不見龍又不現答曰子親到龍潭陳尚書問洞山五十二位菩薩中為什麼不見妙覺答曰尚書親見妙覺傳曰東漢涿郡太守張豐舉兵反自稱無上將軍與彭寵連兵四年祭遵與朱祐耿弇劉喜俱擊之遵兵先至急攻豐豐功曹孟宏執豐降初豐好方術有道士言豐當為天子以五彩囊褁石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵椎破之豐愕然就死晉郗愔忠於王室而其子超有重名黨桓溫愔疾溫而不知其子與之善超將亡以一箱書付門生曰本欲焚之恐翁年尊必以傷愍致疾我死後若損眠食可呈此箱愔後果哀悼門人呈之皆與溫往反密計愔於是大怒曰小子死恨晚矣更不復哭豫曰張豐之愕然郗愔之不哭與龐公至江西德山見龍潭陳公到洞山時節等耳臨濟宗有四賓主句謂賓中賓賓中主主中賓主中主傳曰洞山價禪師初游方與密師伯者偕行經長沙龍山之下今靈山也見溪流菜葉價回瞻峯巒深秀謂密曰箇中必有隱者乃並溪而進十許里有老僧癭甚以手加額呼曰此間無路汝輩何自而至價曰無路且置菴主自何而入曰我不曾雲水價曰菴主住山幾許時曰春秋不涉價曰菴主先住耶此山先住耶曰不知價曰為什麼不知曰我不曾人天來價曰得何道理便住此山曰見兩箇泥牛鬬入海直至而今無消息價即班密之下而拜之問如何是主中賓曰青山覆白雲又問如何是主中主曰長年不出戶又問賓主相去幾何曰長江水上波又問賓主相見有何言說曰清風拂白月價又再拜老僧笑視而說偈曰三間茆屋從來住一道神光萬境間莫作是非來辨我浮生穿鑿不相關於是自焚其菴深入層峯價曰此老見江西馬大師而傳失其名價住新豐洞從容問僧何者是汝主人公對曰現祇對者價仰而咨嗟曰此所謂馬後驢前事奈何認以為自己乎佛法平沈此其兆也客中主尚未明況主中主哉僧曰如何是主中主價曰汝自道看對曰道得只是客中主未審如何是主中主價良久曰不辭為汝道相續也大難豫觀龍山老僧之意如蕭何之識韓信豈有法哉又較洞山價公之語如霍光之立朝進止亦有律度噫後生之不見古人之大全也審矣價亦以主中主為驚異可疑也雲門宗有三句謂天中函蓋目機銖兩不涉世緣傳曰雲門偃禪師初聞睦州古寺有道蹤禪師號陳尊宿見黃蘗運公往謁之方叩戶俄陳尊宿者出搊住曰道道偃愕然不知所答於是推而去曰秦時𨍏轢鑽即闔戶偃折一足而悟旨於言下既有衆而以此三句為示者解釋秦時𨍏轢鑽之詞也法華經曰得一切衆生語言三昧而大智論曰善入音聲陀羅尼以此也抽顧頌曰顧鑒咦雲門經行逢僧必特顧之曰鑒僧欲酬之則曰咦率以為常故門弟子録曰顧鑒咦圓明密禪師刪去顧字但以鑒咦二字為頌謂之抽顧頌今其兒孫失其旨接人以怒目直視名為提撕名為不認聲色名為舉處便薦相傳以為道眼北塔祚禪師獨笑之作偈曰雲門抽顧笑嬉嬉擬議遭渠顧鑒咦任是張良多智巧到頭於此也難施道吾石霜子父有王種臣種內紹外紹傳曰唐郭中令李西平皆稱王然非有種也以勳勞而至焉高祖之秦王明皇之肅宗則以生帝王之家皆有種非以勳勞而至焉者也謂之內紹者無功之功也先聖貴之謂之外紹者借功業而然故又名曰借句曹山章禪師曰妙明體盡知傷觸力在逢緣不借中雲居弘覺禪師曰頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別德山鑑禪師曰有言時騎虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂傳曰巖頭奯禪師曰但明取綱宗本無實法不見道無實無虗若向上事覷即疾若向意根下尋卒摸索不著又曰此是向上人活計只露目前些子如同電拂如擊石火截斷兩頭靈然自在若道向上有法有事賺汝真碗鳴聲荼糊汝繫汝古人喚作繫驢橛若將實法與人土亦消不得夫言截斷兩頭者飲光微笑不是有言亦非默然故汾陽偈曰飲光尊者同明證瞬目欽恭行正令同電拂擊石火之譬也豫嘗作偈曰與人實法土難消道火何曾口被燒拋出秦時𨍏轢鑽突巒如斗兩頭搖經首所題字傳曰昔豫至臨川與朱顯謨世英游相好也俄南昌上藍長老至上藍雅自標致謂世英曰覺範聞工詩耳禪則其師猶錯矧弟子耶世英笑曰師能勘驗之乎上藍曰諾居一日同游疏山飯於逆旅上藍謂余曰經軸之上必題此字是底義豫以指畫圓相橫貫一畫曰是此義也上藍愕然余乃為說偈曰以字不成八不是法身睡著無遮閉衲僧對面不知名百衆人前呼不起於是上藍不懌歸舉似世英世英為拊手曰孰謂詩僧亦識字義乎今兩人皆成千古矣追繹之可為憮然余聞汾陽嘗作黃犢偈曰有頭無角實堪嗟百劫難逃這作家凡聖不能明得盡現前相貌有些些豫以謂此偈又余字義之訓詁也九原可作世英當有一捧腹也臨濟曰大凡演唱宗乘須一句中具三玄一玄中具三要有玄有要傳曰余昔菴於高安九峯之下有僧問余曰臨濟會中兩僧一日相見同時下喝臨濟聞之升座曰大衆要會臨濟賓主句問取堂中二禪客僧便問那箇是賓那箇是主臨濟曰賓主歷然余方欲酬之頓見三玄三要之旨於是再拜曰大哉無為寂滅之幢也雖百千世有聞之者偷心死盡況余去大師餘二百年哉作偈曰一句中具三玄門一玄中具三要路細看即是陷虎機忽轟一聲塗毒鼓偷心死盡眼麻迷石女夢中毛卓豎明招謙禪師偈曰師子教兒迷子法進前跳躑忽翻身羅文結角交加處鶻眼龍睛失却真傳曰德山四世而有謙謙眇而機頴叢林號獨眼龍游方時齒尚少耆年皆畏讋之嘗與僧擁爐僧問曰古人道目前無法意在目前不是目前法非耳目所到只如此四句中那句是賓那句是主謙指火曰與我向此中拈出一莖眉毛得麼僧曰非但學人盡大地人喪身失命謙曰汝因什麼自把髻投衙乎謙將化升座曰一百年中祗看今日今日事作麼生吾住此山四十年唯用一劍活人眼目乃拈巾曰如今有純陀麼提向諸方展看作擲勢僧問純陀獻供末後殷勤時如何謙曰莫相辜負好又問和尚遷化向什麼處去舉足曰足下看又問百年後以何為極則謙提巾便擲僧再拜退就列於是謙說偈曰驀刀肚裏逞全威汝等諸人善護持火裏鐵牛生犢子臨岐誰解湊吾機言卒而化四十二章經曰𢬵命必死難傳曰韓信為淮陰侯稱疾不朝而陳狶一代相過辭信信挈其手與步於庭數匝仰天而嘆曰子可與言乎吾欲與子有言狶因曰唯將軍命信曰公之所居天下精兵處也而公陛下之信幸臣也人言公反陛下不信再至乃疑三至必怒而自將吾為公從中起天下可定也狶曰謹奉教漢十年狶果反高帝自將而往信病不從陰使人之狶所而與其家臣謀夜詐赦諸官徒奴欲襲高后太子部署已定待狶報俄有人告呂后后斬之鍾室信料事無遺䇿方是時信無兵乃曰為公從中起可疑也故信雖就誅其心果死乎馬謖街亭之敗諸葛孔明誅之臨終與孔明書曰明公視謖猶子謖視明公猶父願深惟殛鯀興禹之義使平生之交不虧於此謖雖死無恨於黃壤也於時十萬之衆為之垂淚豫以是觀之信之死非真死者也謖可謂𢬵命非真死可乎易噬嗑卦曰利用獄亨傳曰黃龍南禪師昔住廬山歸宗寺火一夕而燼下獄不食六十日既釋放菴於石門之南塔嘗謂門弟子曰我在獄證法華經菩薩游戲三昧經曰菩薩游戲神通淨佛國土心不好樂呵小乘也以其不能成就衆生耳弟子請聞其說黃龍曰凡獄吏之治有罪者察見其情僞必痛加捶楚欺詐之實盡則自釋雖有酷刑不能申也罪至於死亦所甘心者智迄情枯故也今禪學者馳求之狂欺詐之病不以知見之慧鍛之何由而釋故其平生止以三種語驗天下衲子豫少年聞老宿夜語及之今二十年也其說有補叢林故録焉香嚴間禪師偈曰有一語全規矩擬思量帶伴侶踏不著省來處一生參學事無成殷勤抱得旃檀樹傳曰棗柏論曰烏洛迦旃檀香者烏洛迦蛇名旃檀者香樹也明此蛇最毒常患熱毒以身繞此香樹其毒氣便息表若有衆生聞說心境俱空本無體相無有處所無一法可得之香信而悟入一切煩惱毒氣自然清淨豫以是知殷勤抱得旃檀樹之語非苟然發也楞伽經曰不應攝受隨說計著真實者離名字故大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言說指攝受計著至竟不捨終不能得離言說指第一實義傳曰僧問九峯禪師曰深山中還有佛法也無答曰有僧曰如何是深山中佛法答曰石頭大者大小者小今學者聞舉便欣然以為解了有詰之者則曰觸目全真頭頭顯現嗟乎此所謂觀指不得實義者也豫嘗與僧自逍遙山經亂石㵎入五峯休於樹陰舉此因緣作偈曰石頭若是佛法法身應不靈聖佛法若有大小法身應分少剩枯骨頭上沒汁衲僧眼見不信八萬四千法門一句為汝說盡石頭參同契曰四大性自復如子得其母傳曰此語之妙學者罕能識之蓋子之得其母則不假取於人而自信者也圭峯密禪師初讀圓覺經至恆作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處恍然而悟如子得母也破色心論曰彼一非可見多亦不可見和合不可見是故無塵法此偈明何義汝向說言色等諸入皆是實有何以故以識能取外境界者此義不然何以故有三義故無色等入何等為三一者為實有一微塵如彼外道衛世師等虗妄分別離於頭目身分等外實有神我微塵亦爾離色香等實有否耶二者為實有多微塵差別可見否耶三者為多微塵和合可見否耶此明何義若實有彼一微塵者則不可見如彼外道衛世師等虗妄分別離於頭目身分等外有一神我不可得見微塵亦爾離色香等不可得見是故無一實塵可見是故偈言彼一非可見故若實有多微塵差別者應一一微塵歷然可見而不可見以是義故多塵差別亦不可見是故偈言多亦不可見故多微塵和合不可見者此亦不然何以故以一微塵實無有物云何和合是故不成是故偈言和合不可見是故無塵法故問曰云何不成答曰偈言六塵同時合塵則有六相若六唯一處諸大是一塵此偈明何義若諸微塵從六方來六塵和合若如是者塵有六方若有六方則有六相又若微塵有處所者不容餘塵是故偈曰六塵同時合塵則有六相故若六微塵唯一處者一微塵處有六微塵若如是相者六塵一處若一處者則六塵不可得見何以故彼此微塵無差別故若如是者一切粗物山河等事亦不可見是故言若六唯一處諸大是一塵故一塵者無物如向前答一多和合不可得見故傳曰衛世師等起一種執執離頭目身分之外有一神我者此神我有而不可見故論稱一微塵若離色聲香味等外而有此一微塵應如神我有而不可見也耶塵如果有六方之相則曉然可識不可雜故曰不容餘塵又若六塵和合而不可見則山河大地亦不可見以皆是和合於塵和合則不可見於山河大地亦以和合獨可見乎無是理也但諸佛境綿密難見非世喻可況四量之中有聖斷量謂凡法不入現量比似之量者則以聖斷量定之如世尊言三界唯心大智度論曰問曰聞者云何聞用耳根聞耶用耳識聞耶用意識聞耶若耳根聞耳根無覺識知故不應聞若耳識聞耳識一念故不能分別不應聞若意識聞意識亦不能聞何以故先五識識五塵然後意識識意識不能識現在五塵唯識過去未來五塵若意識能識現在五塵者盲聾人亦應識聲色何以故意識不破故答曰非耳根能聞聲非耳識亦非意識是聞聲事從多因緣和合故得聞聲不得言一法能聞聲何以故耳根無覺故不應聞聲識無色無對無處故亦不聞聲聲無覺無根故不知聲爾時耳根不破聲至可聞處意欲聞情塵意和合故耳識隨生耳識即生意識能分別種種因緣得聞聲以是故不應作難雖聞聲佛法中亦無有法能作能見能知如偈說有業亦有果無作業果者此第一甚深是佛法能見雖空亦不斷相續亦不常罪福亦不失如是佛法說傳曰有僧嘗問荷澤會禪師見聞照聲色時唯復抗行耶唯有先後答曰抗行先後即且止汝畢竟將什麼作聲色僧曰如師所論則無聲色可得也於是再拜即日發去後隱於蒙山首山念禪師有僧問如何是佛答曰新婦騎驢阿家牽僧曰未審意旨如何答曰百歲翁翁失却父僧曰百歲翁翁豈有父耶首山曰汝會也又曰此是獨坐無尊卑從上無一法與人傳曰首山高弟有神鼎諲禪師嘗問僧舉似此語作偈曰新婦騎驢阿家牽誰後復誰先有問又須向渠道新婦騎驢阿家牽是老以無師智自然智吐稱性語能形容不可傳之妙耆年住山學者從之有問而默則疑以為不肯為我說有問有答則是以言遣言世諦有為此意所從來遠矣阿難嘗問迦葉世尊付金襴之外更傳何法迦葉呼曰阿難阿難應諾迦葉曰倒却門前剎竿著寶公十二時偈曰食時辰無明本是釋迦身坐臥不知元是道只麼忙忙受苦辛認聲色覓疏親只是從前染汙人若欲將心求佛道問取虗空始出塵傳曰僧問雲菴如何是道雲菴曰寶公云若欲將心求佛道問取虗空始出塵汝今求佛道虗空向汝道什麼其僧於是大悟於言下昔亮座主參馬祖祖問汝稱講經將何物講對曰將心講祖曰心如工伎兒意如和伎者如何講得經亮厲語曰心若講不得莫是虗空講得麼祖曰却是虗空講得亮亦契悟歸謂其學徒曰我自謂平生講業天下無能過者今日見開元老宿一唾淨盡我從前見解皆欺誑汝遂渡漳水隱於西山豫嘗作漁父詞歌其標韻曰講處天花隨玉麈波心月在那能取旁舍老師偷指注回頭覷虗空特地能言語歸對學徒重自訴從前見解都欺汝隔岸有山橫暮雨翻然去千巖萬壑無尋處洞山尊貴旨訣傳曰雲居膺禪師曰僧家發言吐氣須有來由莫將作等間這裏是什麼處所爭受容易凡問箇事也須識些子好惡若不識尊卑良賤不知觸犯信口亂道也無利益並馳行腳到處覓相似語所以尋常向兄弟道莫怪不相似恐同學太多去第一莫將來將來不相似言語也須看首尾八十翁翁出場屋不是小兒戲不是因循底事一言參差即千里萬里難為收攝蓋為學處容易又曰汝等諸人直饒學得佛邊事蚤是錯用心了也不見古人講得天花落石點頭尚不干自己事自餘是什麼間如今擬將有限身心向無限中用有什麼交涉如將方木逗於圓孔多少譊訛若無恁麼事饒汝說得簇花簇錦亦無用處未離識情在一切事須向這裏及盡始得無過方得出身若一毫髮去不盡即被塵纍豈況更多差之毫釐過犯山嶽不見古人道學處不玄盡是流俗閨閣中物捨不得俱為滲漏直須向這裏及取及去及來併盡一切事始得無過如人頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別便是世間極重極貴物不得將來向尊貴邊須知不可思議不當好心所以古人道猶如雙鏡光光相對光明相照更無虧盈豈不是一般猶喚作影像邊事如日出照於世間明朗是一半那一半喚作什麼如今人未識得光影門頭戶底粗淺底事將作屋裏事又爭得又曰升天底事須對衆揚却十成底事對衆丟却擲地作金聲不得回頭顧著自餘有什麼用處不見二祖當時詩書博覽三藏聖教如觀掌中因什麼更求達磨安心將知此門中事不是等間豫味雲居之語知尊貴之旨須自悟噫垂衣裳而天下治者堯舜也圓覺經曰金剛藏菩薩問世尊曰若諸衆生本來成佛何故復有一切無明若諸無明衆生本有何因緣故如來復說本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱而世尊答曰善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪回未出輪回而辨圓覺彼圓覺性即同流轉若免輪回無有是處傳曰圭峯曰此段義窮盡甚深疑念故菩薩難意云衆生本佛今既無明十方如來後應煩惱佛答意云即此分別便是無明故見圓覺亦同流轉如雲駛月運等但一念不生則前後際斷如翳差華亡衆生即佛人罕能知知而寡信信而鮮解解亦難臻此境翠嵓真點𮌎好問僧文殊是七佛之師因甚出女子定不得罔明從下方來因甚却出得女子定莫有能對者獨英邵武方其問時以手掐其膝而去真笑曰賣匙筯客未在豫以謂英邵武可謂一念不生前後際斷者耶永明禪師有僧問以心為宗禪門正脈且心是名以何為體答曰近代以來今時學者多執文背旨昧體認名認名忘體之人豈窮實地狥文迷旨之者何契道源則心是名以知為體此是靈知性自神解不同妄識仗緣託境作意而知又不同太虗空廓斷滅無知傳曰肇論曰般若無知者無有取相之知也常人皆謂般若是智智則有知也若有知則有取著若有取著則不契無生今明般若真智無相無緣雖鑑真諦而不取相故云無知也故經云聖心無知無所不知矣又經云真般若者清淨如虗空無知無見無作無緣斯則知自無知矣不待忘也以此知真知不落有無之境是以諸佛有祕密祕密之教祖師有默傳密付之宗唯親省而相應非言詮之表示若明宗者了然不昧寂爾常知也魏府元禪師曰佛法在日用處行住坐臥處喫茶喫飯處語言相問處所作所為舉心動念又却不是也臨濟四喝傳曰金剛王劍覿露堂堂才涉唇吻即犯鋒鋩鋸地師子本無窠臼顧佇停機即成滲漏探竿影草不入院界一點不來賊身自敗有時一喝不作一喝用佛法大有只是牙痛此四偈豫年三十五時作今五十二偶閲舊書見之於是喟然而嘆昔李北海以能書名世而世爭師其筆法北海笑曰學我者拙似我者死四偈有旨的如學北海書而似者耳首山上堂曰昔興化和尚示衆云大衆興化放你諸人不得不得如何若何須是單刀直入興化為你證據時有旻德長老出衆禮拜起便喝興化亦喝旻德又喝興化又喝旻德便休興化乃曰適來若是別人三十棒一棒也較不得何故他旻德會一喝不作一喝用首山曰看他興化與麼用為什麼放得他過諸上座且道什麼處是一喝不作一喝用前一喝後一喝且道那箇是賓那箇是主雖然如是亦須子細便下座又曰二俱有過二俱無過豫觀首山可謂臨濟興化的骨孫也洞山五位傳曰天下後世學者多疑達磨所傳之意使可祖自求其心且不可得矧所謂洞上五位者耶是不達先聖之遠略所以防間異道邪說之摩拂正法也故特建法幢意若曰有能通達其旨趣受用其法門臨機無疑遇緣不退者即吾法流不然非其眷屬故有五偈皆精妙祕奧非上智大根莫能到其境今叢林聞其偈如人聞其父之名可聞而不敢道嗟乎異哉其偈曰正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷昔日嫌既曰不相識而懷昔嫌豈真然耶偏中正失曉老婆逢古鏡分明覿面更無真休更迷頭猶認影方認影耳何謂覿面無真乎正中來無中有路出塵埃但能莫觸當今諱也勝前朝斷舌才偏中至兩刃交鋒莫回避好手還同火裏蓮宛然自有沖天氣正中來則獨倡而未和偏中至則賓主叶和也兼中到不落有無誰敢和人人盡欲出常流折合終歸炭裏坐獨此一位沒偏正之名此其難和蓋所謂出凡聖路學離心意識參及盡無功虗玄妙道者也然其要擬心動念即迷宗失旨故汾陽偈曰五位參尋切要知纖毫才動即差違金剛透匣誰能會唯有那吒第一機舉目便令三界淨振鈴還許九天歸正中妙挾通回互擬議鋒芒失却威法華經安樂行品曰菩薩行處住忍辱地柔和善順而不卒暴心亦不驚傳曰龍勝曰忍為最妙行者當作是念我若以瞋報彼則為自害又我先自有是罪不得如意要必當償若於此人不受餘亦害我俱不得免云何起瞋又忍為磔磲能瑩諸功德若人加惡如猪揩金山益發其明求佛道利衆生之利器也永嘉作證道歌敘六度而以忍為首曰從他謗任他非把火燒天徒自疲我聞恰似飲甘露消融頓入不思議揚州建隆慶禪師有卓行黃龍南公高弟也為東坡少游孫莘老鄒志完諸公所禮敬有門弟子懷奸少叢林為慶呵辱不勝其忿走白莘老少游曰諸公以建隆為有道者然無奈其好欲嘗私一尼童知之否諸公大驚知其謗因造其廬問之慶笑曰實如所傳竟不復辨人以為難慶後歿火化得五色舍利不勝數其平生踐履之明驗如此華嚴經曰具足優婆夷以忍波羅蜜中具十波羅蜜以常能大捨具檀波羅蜜素服清潔名為持戒被髮毀容名之為忍心常不與世心和合名為精進智悲利俗不與識俱名之禪定已踐佛果出世妙慧名為智慧常處生死接引衆生又無女業示受女身明大悲行是名方便常隨大願六道濟生名之大願不畏生死常轉法輪名之為力隨智幻生一切剎海常施佛事名之為智具足如是十波羅蜜傳曰豫於是十波羅蜜中自觀皆莫能行獨於心常不與世心和合敬奉教矣以情觀之則豫為沙門乃不遵佛語與王公貴人游竟坐極刑遠竄海外既幸生還冠巾說法若可憫笑然豫之志蓋求出情法者法既出情則成敗讚毀道俗像服皆吾精進之光也雲巖寶鏡三昧合古轍上華嚴論曰唯寂唯默心造如來之樣不著不戀入道合法之轍一云是路入法界之轍如是之法佛祖密付汝今得之其善保護首標敘語而為結語丁寧之詞何也是古轍全提時節法華曰如是妙法諸佛如來時乃說之如優曇華時一現耳舍利弗汝等當信佛之所說言不虗妄舍利弗殷勤三請而世尊方許說之及其渴聞便為結語昔雲巖深得此意洞山辭去時問曰百年後或有人問還邈得師真否如何祇對巖云但向伊道只這是洞山沈吟巖曰價闍黎承當這箇大事直須子細洞山初無所言後因過水覩影方始頓悟銀盤盛雪明月藏鷺類之弗齊混則知處意不在言來機亦赴雲門問僧佛法還有長短也無自代云這箇師僧與麼肥那箇師僧與麼瘦蓮華峯問僧佛法還有彼此也無自代云那裏搗藥這裏向火風穴問念法華如何是世尊不說說念曰動容揚古路不墮悄然機所以同安曰枯木巖前蹉路多行人到此盡蹉跎者以智眼多濁不見古人不傳之妙巴陵以三轉語酬雲門法乳之恩非徒語也動成窠臼差落顧佇背觸俱非如大火聚巖頭曰不用思搭著昏昏地才有所動便成窠臼古人喚作貼體衣病最難治也洞山云擬心蚤差況復有言耶般若如火聚觸即被燒背即非火百丈云但兩頭捉汝不著免苦樂相形明暗相酬譬如卦兆便被五行所管也但形文彩即屬染汙夜半正明天曉不露百丈曰從來是箇物不要知渠解渠是渠非渠但刈斷兩頭句刈斷有無句不無不有句兩頭迹不現兩頭捉汝不著不是缺少不是具足非凡非聖不明不暗不是有知不是無知不是繫縛不是解脫不是一切名目何以問不以實語答若為雕琢得虗空為佛相貌若為道虗空是青黃赤白所以維摩云法無有比不可喻故法身無為不墮諸數故本無名目謂之佛是染汙謂之法是染汙所以讓公云說似一物即不中為物作則用拔諸苦雖非有為不是無語溈山云實際理中本無是法所以不欣取著為物作則之時要用便用若於餘時無一塵繫念涅槃經云有所說者名有為法如來世尊非是有為是故無說而藥山又曰第一不得絶卻言語他說箇語顯箇無語底如臨寶鏡形影相覩汝不是渠渠正是汝但言汝是染汙故言汝不是渠便爾休去則成兩句故又言渠正是汝故成三句也如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終必得物語未正故涅槃經曰云何名嬰兒行善男子不能起住去來語言是名嬰兒行如來亦爾不能起者如來終不起諸法相不能住者如來不著一切諸法不能來者如來身行無有動搖不能去者如來已到大般涅槃不能語者如來雖為一切衆生演說諸法實無所說何以故有所說者名有為法如來世尊非是有為是故無說又無語者猶如嬰兒言語未了雖復有語實亦無語如來亦爾語未了者即是祕密諸佛之言雖有所說衆生不解故名無語又嬰兒者名物不一未知正語雖名物不一未知正語非不因此而得識物如來亦爾一切衆生方類各異所言不同如來方便隨而說之亦令一切因而得解如離六爻偏正回互疊而為三變盡成五離南方之卦火也心之譬也其爻六劃回互成五卦重疊成三卦如第二爻三爻四爻又成一卦巽也第三爻四爻五爻又成一卦兌也此之謂疊為三也下巽上兌又成一卦大過也下兌上巽又成一卦中孚也此之謂變成五也正中來偏中至正中偏偏中正兼中到大過中孚巽兌重離如荎草味如金剛杵荎五味子也一草而具五味金剛杵首尾俱闊而中狹又首尾俱虗而中實原先聖之意以重離五變三疊世間法也例嬰兒不去不來不起不住不能正語出世間法也於是方便建立五路三位學者思之正中妙挾敲唱雙舉通宗通塗挾帶挾路妙挾語忌十成雙舉語有清濁通宗自受用三昧機不昧終始通塗他受用三昧賓主音信相通血脈不斷錯然則吉不可犯忤此易離卦初爻之詞以火性上炎當錯然敬之臨濟云如金剛王寶劍其鋒不可觸也同塵相下楞伽經曰如楔出楔本欲其離語然必假語也天真而妙不屬迷悟因緣時節寂默昭著南臺偈曰妙哉三下板知識盡來參既善知時節吾今不再三細入無間大絶方所毫忽之差不應律呂如樂黃鍾之管九寸差一忽則音不應宮故三祖曰毫𨤲有差天地懸隔趙州曰一切但仍舊方合古轍蓮華峯亦曰但能隨處安閒自然合他古轍今有頓漸緣立宗趣宗趣分矣即是規矩宗通趣極真常流注圓覺經曰一切衆生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果將知天真而妙不屬迷悟日用皆證特以依師尋求修習便成頓漸至其宗趣妙極猶為理障礙正知見故名真常流注玄沙云第一句綱宗且自承當現成具足盡十方世界更無他故只是仁者更教誰見誰聞都來只是汝心王所為全成不動佛只缺自承當喚作開方便門且要汝諸人信有一分真常流注亘古亘今未有不是者未有不非者如此一句成平等法何以故以言逐言以理遣理平常性相說法度人然猶明前不明後未有出格之句死在句中外寂中搖係駒伏鼠駒係不忘馳鼠伏偷心在耳先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許只此肯心金鎖玄路要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之馵法華經曰佛告諸比丘大通智勝佛壽五百四十萬億那由他劫其佛本坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛法不現在前如是一小劫乃至十小劫結加趺坐身心不動而諸佛法猶不在前爾時忉利諸天先為彼佛於菩提樹下敷師子座高一由旬佛於此座當得阿耨多羅三藐三菩提適坐此座時諸梵天王雨衆天花面百由旬香風時來吹去萎花更雨新者如是不絶滿十小劫供養於佛乃至滅度常雨此花四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至於滅度亦復如是諸比丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提宴坐十小劫謂之垂成過十小劫佛法方現前如來世尊之意深妙而著曹山曰劫者滯也只為未忘大果耳虎一名李耳凡虎食畜産不至耳諱其名也然每食一人耳輒一缺馵者馬後左腳裏有白點處如虎之缺言不敢觸諱也如馬之馵言語忌十成也以有下劣寶几珍御以有驚異黧奴白牯下劣凡情也驚異聖情也羿以巧力射中百步箭鋒相直巧力何預射至百步力也射中百步巧也至箭鋒相直則非巧力所及木人方歌石兒起舞非情識到寧容思慮同安曰萬古碧潭空界月載三撈摝始應知臣奉於君子順於父不順非孝不奉非輔香嚴曰於此門成孝義賢子孫密安置洞山曰此事如節度使符印一路不通即是不奉於君潛行密用如愚若魯但能相續名主中主僧問洞山如何是主中主洞山云汝自道取僧云某道得只是客中主請和尚道山云不辭向汝道相續也大難昔人有言切忌說破而此書挑刮示人無復遺意吁可怪也罷參禪伯以此書為文字教禪而見詆新學後進以此書漏泄己解而見憎孔子作春秋曰知我者其唯春秋乎罪我者其唯春秋乎嗟哉猶未若此書有罪之者而無知之者也頃辛丑歲余在長沙與覺範相從彌年其人品問學道業知識皆超妙卓絶過人遠甚喜與賢士大夫文人游橫口所言橫心所念風駛雲騰泉涌河決不足喻其快也以此屢縈禍譴略不介意視一死不足以驚懼之者守此以歿不少變節大抵高者忌其異己下者耻其不逮阽於死亡不足以償人意暗黷百出而覺範無纖毫之失奉戒清淨世無知者今此書復出於歿後竊度此意蓋慈心仁勇憫後生之無知邪說之害道犯昔人之所切忌而詳言之者也寧使我得罪於先達獲謗於後來而必欲使汝曹聞之於佛法中與救鴿飼虎等於世法中程嬰公孫杵臼貫高田光之用心也烏乎賢哉紹興四年九月晦日闡提居士許顗彥周後序
