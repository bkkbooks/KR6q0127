body:
  text: 重刻智證傳引大法之衰由吾儕綱宗不明以故祖令不行而魔外充斥即三尺豎子掠取古德剩句不知好惡計為己悟僭竊公行可嘆也有宋覺範禪師於是乎懼乃離合宗教引事比類折衷五家宗旨至發其所祕犯其所忌而不惜昔人比之貫高程嬰公孫杵臼之用心噫亦可悲矣書以智證名非智不足以辨邪正非證不足以行賞罰蓋照用全方能荷大法也充覺範之心即天下有一人焉能讀此書直究綱宗行祖令斯不負著書之意即未能洞明此書而能廣其傳於天下以待夫一人焉能洞明之者縱未能即酬覺範之志亦覺範所與也覺範所著有僧寶傳林間錄與是書相表裏業已有善刻金沙于中甫比部復捐貲刻是書三集並行於世亦法門一快事也有志於宗門者珍重流通是所望云皇明萬歷乙酉夏六月既望僧真可述附達觀師書智證之義或以維摩受諸觸如智證釋之非洪老著書意也吾究之久矣當以吾釋為準藏公切勿疑之如吾序文醜拙宜用心與具區公共潤色之方可入刻
